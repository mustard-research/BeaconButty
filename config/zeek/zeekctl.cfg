# Zeekctl global configuration

# Rotate logs every hour so RITA can import them in near-real-time
LogRotationInterval = 3600

# Keep 14 days of Zeek logs in log2ram (one dir per day); auto-expired by zeekctl.
# NOTE: zeekctl interprets a bare integer as DAYS, not hours — `14` = 14 days.
LogExpireInterval = 14

# Write performance stats every 5 minutes
StatsLogEnable = 1
StatsLogExpireInterval = 7

# WebSocket control channel — required by the ZeroMQ cluster backend for
# zeekctl netstats/print. Needs python3 websockets>=12 (bookworm lacked it,
# hence the old =0; trixie ships 15.x). Listener is manager-local — verify
# with `ss -tlnp | grep zeek` after deploy. Enabled 2026-07-06.
UseWebSocket = 1

# Site-local policy loaded on top of the default scripts
SitePolicyScripts = site/local.zeek

# Directories (default for source install; OBS packages use same layout)
LogDir   = /var/log/zeek
SpoolDir = /opt/zeek/spool

# Mail alerts to root (set to an address if you have a local MTA)
MailTo = root
